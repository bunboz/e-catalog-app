<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo đơn đặt hàng – E-Catalog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F3F4F6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══ TOPBAR ═══════════════════════════════════════ */
    .topbar {
      background: #0052CC;
      color: white;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 54px;
      flex-shrink: 0;
    }
    .btn-back {
      background: rgba(255,255,255,.15);
      border: none; color: white;
      padding: 6px 12px; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }
    .topbar-title { font-size: 15px; font-weight: 700; }
    .topbar-customer {
      font-size: 12px;
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 4px 12px;
      display: flex; align-items: center; gap: 6px;
      max-width: 260px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; position: relative; transition: background .15s;
    }
    .topbar-customer:hover { background: rgba(255,255,255,.25); }
    .customer-dropdown {
      position: absolute; top: calc(100% + 8px); left: 0;
      background: white; border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,.18);
      width: 280px; z-index: 100;
      overflow: hidden;
      animation: ddFadeIn .15s ease-out;
      color: #111827;
    }
    @keyframes ddFadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .customer-dropdown::before {
      content:''; position:absolute; top:-6px; left:24px;
      width:12px; height:12px; background:white;
      transform:rotate(45deg); border-radius:2px;
    }
    .dd-info { padding: 16px; border-bottom: 1px solid #E5E7EB; }
    .dd-name { font-size: 14px; font-weight: 700; color: #111827; }
    .dd-detail { font-size: 12px; color: #6B7280; margin-top: 4px; line-height: 1.6; }
    .dd-actions { padding: 6px; }
    .dd-action {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #374151;
      cursor: pointer; transition: background .1s;
      text-decoration: none; border: none; background: none; width: 100%;
    }
    .dd-action:hover { background: #F3F4F6; }
    .dd-action-icon { font-size: 16px; width: 24px; text-align: center; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .topbar-summary {
      font-size: 12px; color: rgba(255,255,255,.75);
      text-align: right; line-height: 1.4;
    }
    #btnConfirm {
      background: white;
      color: #0052CC;
      border: none; border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all .2s;
      white-space: nowrap;
    }
    #btnConfirm:hover { background: #EFF6FF; }
    #btnConfirm:disabled { background: rgba(255,255,255,.3); color: rgba(255,255,255,.6); cursor: not-allowed; }

    /* ═══ MAIN LAYOUT (horizontal split) ═════════════════ */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 2px solid #E5E7EB;
      min-width: 0;
    }
    .right-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: white;
    }

    /* ═══ BATCH TABS ════════════════════════════════════ */
    .tabs-wrap {
      background: white;
      border-bottom: 1px solid #E5E7EB;
      padding: 0 20px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .batch-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 14px 9px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      font-size: 13px; font-weight: 600;
      color: #9CA3AF;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      user-select: none;
      position: relative;
      bottom: -1px;
    }
    .batch-tab:hover { color: #374151; background: #F9FAFB; }
    .batch-tab.active {
      color: #0052CC;
      background: white;
      border-color: #E5E7EB;
      border-bottom-color: white;
    }
    .batch-tab .tab-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #D1D5DB; flex-shrink: 0;
    }
    .batch-tab.active .tab-dot { background: #0052CC; }
    .batch-tab.has-date .tab-dot { background: #10B981; }
    .batch-tab.active.has-date .tab-dot { background: #10B981; }
    .batch-tab .tab-remove {
      width: 18px; height: 18px; border-radius: 50%;
      background: none; border: none; cursor: pointer;
      color: #D1D5DB; font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .batch-tab .tab-remove:hover { background: #FEE2E2; color: #EF4444; }
    .btn-add-tab {
      margin-bottom: 0; padding: 8px 14px;
      background: none; border: 1.5px dashed #D1D5DB;
      border-radius: 8px 8px 0 0; cursor: pointer;
      color: #9CA3AF; font-size: 18px; font-weight: 300;
      transition: all .15s; line-height: 1;
      position: relative; bottom: -1px;
    }
    .btn-add-tab:hover { border-color: #0052CC; color: #0052CC; background: #EFF6FF; }

    /* ═══ TAB CONTENT ═══════════════════════════════════ */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Batch meta (date + note) */
    .batch-meta {
      background: white;
      border-bottom: 1px solid #E5E7EB;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .meta-group { display: flex; align-items: center; gap: 8px; }
    .meta-label { font-size: 12px; color: #9CA3AF; font-weight: 600; white-space: nowrap; }
    .meta-input {
      border: 1px solid #E5E7EB; border-radius: 6px;
      padding: 6px 10px; font-size: 13px; color: #374151;
      font-family: inherit; background: white; transition: border-color .2s;
    }
    .meta-input:focus { outline: none; border-color: #0052CC; box-shadow: 0 0 0 2px rgba(0,82,204,.08); }
    .meta-input.missing { border-color: #F59E0B; background: #FFFBEB; }
    .meta-note { flex: 1; }

    /* ═══ PRODUCT ITEMS ═════════════════════════════════ */
    .items-section {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .items-section-label {
      font-size: 11px; font-weight: 700; color: #9CA3AF;
      letter-spacing: 0.5px; text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: space-between;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #F3F4F6;
      transition: background .1s;
    }
    .item-row.inactive { opacity: .45; }
    .item-thumb {
      width: 40px; height: 40px; border-radius: 8px;
      background: #F9FAFB; border: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 11px; color: #9CA3AF; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .item-color-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .item-remaining {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .item-remaining.has-remain { background: #FEF3C7; color: #D97706; }
    .item-remaining.no-remain  { background: #D1FAE5; color: #059669; }
    .item-price { font-size: 12px; color: #0052CC; font-weight: 700; text-align: right; min-width: 90px; flex-shrink: 0; }

    /* qty control */
    .qty-ctrl {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid #E5E7EB; background: white; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #374151;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .qty-btn:hover { border-color: #0052CC; color: #0052CC; }
    .qty-input {
      width: 44px; text-align: center; font-size: 14px; font-weight: 700;
      color: #111827; border: 1px solid #E5E7EB; border-radius: 6px;
      padding: 4px 0; background: white;
    }
    .qty-input:focus { outline: none; border-color: #0052CC; }
    .qty-input.positive { color: #0052CC; border-color: #BFDBFE; background: #EFF6FF; }

    /* Unallocated section */
    .unalloc-section {
      margin-top: 8px;
      background: white;
      border-top: 1px solid #E5E7EB;
      padding: 12px 20px;
      flex-shrink: 0;
    }
    .unalloc-label {
      font-size: 11px; font-weight: 700; color: #9CA3AF;
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .unalloc-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #F3F4F6;
    }
    .unalloc-item:last-child { border-bottom: none; }
    .unalloc-info { flex: 1; min-width: 0; }
    .unalloc-name { font-size: 13px; font-weight: 500; color: #6B7280; }
    .unalloc-qty { font-size: 11px; color: #F59E0B; font-weight: 600; }
    .btn-add-item {
      background: #EFF6FF; border: 1px solid #BFDBFE;
      color: #0052CC; border-radius: 6px;
      padding: 5px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-add-item:hover { background: #DBEAFE; }

    /* ═══ BATCH SUMMARY ═════════════════════════════════ */
    .batch-footer {
      background: white;
      border-top: 2px solid #E5E7EB;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }
    .bf-stat { padding-right: 20px; margin-right: 20px; border-right: 1px solid #E5E7EB; }
    .bf-stat:last-of-type { border-right: none; }
    .bf-label { font-size: 10px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.4px; }
    .bf-value { font-size: 15px; font-weight: 700; color: #111827; }
    .bf-value.blue { color: #0052CC; }
    .bf-warnings { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .bf-warn { font-size: 12px; color: #D97706; font-weight: 500; }
    .bf-ok   { font-size: 12px; color: #059669; font-weight: 500; }

    /* ═══ EMPTY BATCH ═══════════════════════════════════ */
    .empty-batch {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #9CA3AF; gap: 8px; padding: 60px 20px;
    }
    .empty-batch-icon { font-size: 40px; }
    .empty-batch-title { font-size: 14px; font-weight: 600; }
    .empty-batch-sub { font-size: 12px; }

    /* ═══ CONFIRM OVERLAY ══════════════════════════════ */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .confirm-card {
      background: white; border-radius: 16px;
      width: 680px; max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: slideUp .25s ease-out;
    }
    .confirm-header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid #E5E7EB;
    }
    .confirm-header h2 { font-size: 18px; font-weight: 700; color: #111827; margin: 0; }
    .confirm-header p { font-size: 13px; color: #6B7280; margin-top: 4px; }
    .confirm-body { flex: 1; overflow-y: auto; padding: 20px 28px; }
    .confirm-footer {
      padding: 16px 28px;
      border-top: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cb-batch { margin-bottom: 20px; }
    .cb-batch:last-child { margin-bottom: 0; }
    .cb-batch-header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 8px; border-bottom: 1px solid #E5E7EB;
      margin-bottom: 8px;
    }
    .cb-batch-dot { width: 10px; height: 10px; border-radius: 50%; background: #0052CC; }
    .cb-batch-title { font-size: 14px; font-weight: 700; color: #111827; }
    .cb-batch-date { font-size: 12px; color: #6B7280; margin-left: auto; }
    .cb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0; font-size: 13px; color: #374151;
    }
    .cb-item-icon { font-size: 16px; }
    .cb-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cb-item-qty { font-weight: 700; color: #0052CC; min-width: 36px; text-align: center; }
    .cb-item-price { font-weight: 600; color: #111827; min-width: 90px; text-align: right; }
    .cb-batch-total {
      display: flex; justify-content: flex-end; gap: 12px;
      padding-top: 8px; border-top: 1px solid #F3F4F6;
      font-size: 13px; font-weight: 700; color: #0052CC;
      margin-top: 4px;
    }
    .cb-note { font-size: 11px; color: #9CA3AF; font-style: italic; margin-top: 4px; }
    .confirm-total-bar {
      background: #F9FAFB; border-radius: 10px;
      padding: 14px 20px; margin-top: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .confirm-total-bar .ctl { font-size: 13px; color: #6B7280; }
    .confirm-total-bar .ctv { font-size: 18px; font-weight: 800; color: #0052CC; }
    .btn-confirm-final {
      background: #0052CC; color: white; border: none; border-radius: 10px;
      padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .btn-confirm-final:hover { background: #003D99; }
    .btn-confirm-cancel {
      background: none; border: 1px solid #E5E7EB; border-radius: 10px;
      padding: 10px 20px; font-size: 13px; font-weight: 600; color: #6B7280;
      cursor: pointer; transition: all .15s;
    }
    .btn-confirm-cancel:hover { border-color: #9CA3AF; color: #374151; }

    /* ═══ IPAD ═════════════════════════════════════════ */
    @media (max-width: 1024px) {
      .topbar { padding: 0 14px; height: 50px; gap: 10px; }
      .topbar-title { font-size: 14px; }
      .topbar-summary { font-size: 11px; }
      #btnConfirm { padding: 8px 14px; font-size: 12px; }

      .main-layout { flex-direction: column; }
      .left-panel { border-right: none; border-bottom: 2px solid #E5E7EB; flex: none; height: 60%; }
      .right-panel { width: 100%; height: 40%; border-top: 1px solid #E5E7EB; }

      .tabs-wrap { padding: 0 14px; }
      .batch-tab { padding: 10px 12px; font-size: 13px; }
      .batch-meta { padding: 10px 14px; }
      .items-section { padding: 12px 14px; }

      .item-row { gap: 8px; padding: 10px 0; }
      .item-thumb { width: 36px; height: 36px; font-size: 16px; }
      .item-name { font-size: 13px; }
      .qty-btn { width: 34px; height: 34px; font-size: 16px; }
      .qty-input { width: 48px; font-size: 15px; }

      .batch-footer { padding: 10px 14px; }
      .bf-value { font-size: 14px; }

      .btn-add-item { padding: 8px 12px; font-size: 12px; }
    }

    @media (max-width: 1024px) and (orientation: landscape) {
      .main-layout { flex-direction: row; }
      .left-panel { height: auto; flex: 1; border-right: 2px solid #E5E7EB; border-bottom: none; }
      .right-panel { width: 320px; height: auto; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <button class="btn-back" onclick="history.back()">← Quay lại</button>
  <div class="topbar-title">Tạo đơn hàng</div>
  <div class="topbar-customer" onclick="toggleCustomerDD(event)">
    👤 <span id="topCustomer">—</span> ▾
    <div class="customer-dropdown" id="customerDD" style="display:none;" onclick="event.stopPropagation()">
      <div class="dd-info">
        <div class="dd-name" id="ddName">—</div>
        <div class="dd-detail" id="ddDetail"></div>
      </div>
      <div class="dd-actions">
        <a class="dd-action" href="customer.html">
          <span class="dd-action-icon">📋</span> Xem trang khách hàng
        </a>
        <button class="dd-action" onclick="changeCustomer()">
          <span class="dd-action-icon">🔄</span> Đổi khách hàng
        </button>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-summary" id="topSummary"></div>
    <button id="btnConfirm" disabled onclick="confirmOrder()">📦 Xác nhận tạo đơn</button>
  </div>
</header>

<!-- MAIN HORIZONTAL LAYOUT -->
<div class="main-layout">
  <!-- LEFT: Batches -->
  <div class="left-panel">
    <div class="tabs-wrap">
      <div id="batchTabs" style="display:flex;align-items:flex-end;gap:4px;"></div>
      <button class="btn-add-tab" onclick="addBatch()" title="Thêm đợt giao">+</button>
    </div>
    <div class="tab-content" id="tabContent"></div>
  </div>

  <!-- RIGHT: Unallocated -->
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
'use strict';

// ── STATE ─────────────────────────────────────────────
let cartItems  = [];  // [{variantSku, productId, name, sku, color, size, qty, price, type}]
let customer   = null;
let batches    = [];  // [{id, date, note, alloc:{variantSku:qty}}]
let activeBatch = null;
let batchSeq   = 0;

const COLOR_DOTS = {
  'Bạc': '#C0C0C0', 'Mạ Vàng': '#FFD700',
  'Mạ Vàng Hồng': '#E8A598', 'Vàng 18K': '#FFB800', 'Vàng Trắng': '#E8E8E8',
};
const ICONS = { 1:'💍', 2:'⭕', 3:'🔗', 4:'💎', 5:'✨', 6:'📎' };
const fmt = n => new Intl.NumberFormat('vi-VN').format(n) + 'đ';

const GROUP_COLORS = {
  'vang': { bg: '#FFFBEB', border: '#FCD34D', text: '#92400E', accent: '#F59E0B' },
  'bac':  { bg: '#F9FAFB', border: '#D1D5DB', text: '#374151', accent: '#6B7280' },
};

function groupItemsByMaterial(items) {
  const groups = {};
  items.forEach(item => {
    const key = (item.orderMaterial || '') + '|' + (item.orderPurity || '');
    if (!groups[key]) {
      groups[key] = {
        key,
        material: item.orderMaterial || 'Khác',
        purity: item.orderPurity || '',
        icon: item.materialIcon || '🔩',
        materialId: item.materialId || 'bac',
        items: [],
      };
    }
    groups[key].items.push(item);
  });
  return Object.values(groups);
}

function renderItemRow(item, b) {
  const alloc = b.alloc[item.variantSku] || 0;
  const rem   = remaining(item.variantSku);
  const icon  = ICONS[item.productId] || '💍';
  const dot   = COLOR_DOTS[item.color] || '#9CA3AF';
  const itemId = item.variantSku.replace(/[^a-zA-Z0-9]/g, '_');
  return `
    <div class="item-row">
      <div class="item-thumb">${icon}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          <span class="item-color-dot" style="background:${dot};border:1px solid rgba(0,0,0,.1);"></span>
          ${item.color}${item.size ? ` · Size ${item.size}` : ''}
          · <span style="font-family:monospace;font-size:10px;">${item.variantSku}</span>
        </div>
      </div>
      <span class="item-remaining ${rem > 0 ? 'has-remain' : 'no-remain'}">
        ${rem > 0 ? `còn ${rem} chưa phân` : '✓ Phân bổ đủ'}
      </span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="setAlloc(${b.id},'${item.variantSku}',${alloc-1})">−</button>
        <input class="qty-input ${alloc>0?'positive':''}" type="number"
          id="qi_${itemId}" value="${alloc}" min="0"
          onchange="setAlloc(${b.id},'${item.variantSku}',parseInt(this.value)||0)">
        <button class="qty-btn" onclick="setAlloc(${b.id},'${item.variantSku}',${alloc+1})">+</button>
      </div>
      <div class="item-price">${fmt(alloc * item.price)}</div>
    </div>`;
}

// ── INIT ──────────────────────────────────────────────

// ── BATCH MANAGEMENT ──────────────────────────────────
function addBatch() {
  const id = ++batchSeq;
  const alloc = {};
  const isFirst = batches.length === 0;
  cartItems.forEach(item => {
    alloc[item.variantSku] = isFirst ? item.qty : 0;
  });
  batches.push({ id, note: '', alloc });
  activeBatch = id;
  renderAll();
}

function deleteBatch(id) {
  if (batches.length === 1) return;
  batches = batches.filter(b => b.id !== id);
  if (activeBatch === id) activeBatch = batches[batches.length - 1].id;
  renderAll();
}

function switchBatch(id) {
  activeBatch = id;
  renderAll();
}

function updateNote(id, val) {
  const b = batches.find(b => b.id === id);
  if (b) b.note = val;
}

// ── ALLOCATION ────────────────────────────────────────
function totalAllocated(sku) {
  return batches.reduce((s, b) => s + (b.alloc[sku] || 0), 0);
}

function remaining(sku) {
  const item = cartItems.find(i => i.variantSku === sku);
  return item ? item.qty - totalAllocated(sku) : 0;
}

function setAlloc(batchId, sku, val) {
  const b = batches.find(b => b.id === batchId);
  if (!b) return;
  const item = cartItems.find(i => i.variantSku === sku);
  if (!item) return;
  const otherSum = batches.filter(bb => bb.id !== batchId).reduce((s, bb) => s + (bb.alloc[sku] || 0), 0);
  const max = item.qty - otherSum;
  b.alloc[sku] = Math.max(0, Math.min(max, val));
  renderAll();
}

function changeItemQty(sku, delta) {
  const item = cartItems.find(i => i.variantSku === sku);
  if (!item) return;
  const allocated = totalAllocated(sku);
  const newQty = Math.max(allocated, item.qty + delta);
  item.qty = newQty;
  renderAll();
}

function setItemQty(sku, val) {
  const item = cartItems.find(i => i.variantSku === sku);
  if (!item) return;
  const allocated = totalAllocated(sku);
  item.qty = Math.max(allocated, val);
  renderAll();
}

function addItemToBatch(sku) {
  const b = batches.find(b => b.id === activeBatch);
  if (!b) return;
  const rem = remaining(sku);
  if (rem <= 0) return;
  b.alloc[sku] = rem; // fill all remaining into this batch
  renderAll();
}

  `;
}

function finalizeOrder(orderNum) {
  sessionStorage.removeItem('cartData');
  const totalQty = cartItems.reduce((s, i) => s + i.qty, 0);
  const totalValue = cartItems.reduce((s, i) => s + i.qty * i.price, 0);
  const totalMau = [...new Set(cartItems.map(i => i.productId))].length;
  const createdAt = new Date().toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  const batchColors = ['#0052CC','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899'];

  const statusBadge = `<span style="display:inline-flex;align-items:center;gap:4px;background:#FEF3C7;color:#D97706;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;">⏳ Chờ xử lý</span>`;

  const timelineHtml = batches.map((b, i) => {
    const items = cartItems.filter(item => (b.alloc[item.variantSku] || 0) > 0);
    const bQty = items.reduce((s, item) => s + (b.alloc[item.variantSku] || 0), 0);
    const bTotal = items.reduce((s, item) => s + (b.alloc[item.variantSku] || 0) * item.price, 0);
    const bMau = [...new Set(items.map(it => it.productId))].length;
    const col = batchColors[i % batchColors.length];

    return `
      <div style="display:flex;gap:16px;">
        <!-- Timeline line -->
        <div style="display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0;">
          <div style="width:12px;height:12px;border-radius:50%;background:${col};border:3px solid ${col}22;flex-shrink:0;"></div>
          ${i < batches.length - 1 ? `<div style="width:2px;flex:1;background:#E5E7EB;margin:4px 0;"></div>` : ''}
        </div>
        <!-- Batch card -->
        <div style="flex:1;background:white;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;margin-bottom:16px;">
          <div style="padding:12px 20px;background:${col}08;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div style="font-size:14px;font-weight:700;color:#111827;">Đợt ${i+1}</div>
            <div style="font-size:11px;color:#6B7280;background:#F3F4F6;padding:2px 8px;border-radius:20px;">${bMau} mẫu · ${bQty} sp</div>
            <div style="margin-left:auto;font-size:14px;font-weight:700;color:${col};">${fmt(bTotal)}</div>
          </div>
          ${(() => {
            const matGroups = groupItemsByMaterial(items);
            return matGroups.map(g => {
              const gc = GROUP_COLORS[g.materialId] || GROUP_COLORS['bac'];
              return `
                <div style="margin:8px 20px;">
                  <div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:${gc.bg};border-radius:6px;border:1px solid ${gc.border};margin-bottom:4px;">
                    <span style="font-size:14px;">${g.icon}</span>
                    <span style="font-size:11px;font-weight:700;color:${gc.text};">${g.material}${g.purity ? ' · ' + g.purity : ''}</span>
                  </div>
                </div>
                <table style="width:100%;border-collapse:collapse;font-size:13px;">
                  <thead>
                    <tr style="background:#F9FAFB;color:#9CA3AF;font-size:11px;text-transform:uppercase;letter-spacing:.4px;">
                      <th style="padding:8px 20px;text-align:left;font-weight:600;">Sản phẩm</th>
                      <th style="padding:8px 12px;text-align:center;font-weight:600;width:60px;">SL</th>
                      <th style="padding:8px 12px;text-align:right;font-weight:600;width:90px;">Đơn giá</th>
                      <th style="padding:8px 20px;text-align:right;font-weight:600;width:100px;">Thành tiền</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${g.items.map(item => {
                      const alloc = b.alloc[item.variantSku] || 0;
                      const icon = ICONS[item.productId] || '💍';
                      const dot = COLOR_DOTS[item.color] || '#9CA3AF';
                      return `
                        <tr style="border-bottom:1px solid #F3F4F6;">
                          <td style="padding:10px 20px;">
                            <div style="display:flex;align-items:center;gap:10px;">
                              <span style="font-size:18px;">${icon}</span>
                              <div>
                                <div style="font-weight:600;color:#111827;">${item.name}</div>
                                <div style="font-size:11px;color:#9CA3AF;margin-top:1px;">
                                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dot};border:1px solid rgba(0,0,0,.1);vertical-align:middle;"></span>
                                  ${item.color}${item.size ? ' · Size '+item.size : ''} · <span style="font-family:monospace;font-size:10px;">${item.variantSku}</span>
                                </div>
                              </div>
                            </div>
                          </td>
                          <td style="padding:10px 12px;text-align:center;font-weight:700;color:${col};">${alloc}</td>
                          <td style="padding:10px 12px;text-align:right;color:#6B7280;">${fmt(item.price)}</td>
                          <td style="padding:10px 20px;text-align:right;font-weight:700;color:#111827;">${fmt(alloc * item.price)}</td>
                        </tr>`;
                    }).join('')}
                  </tbody>
                </table>`;
            }).join('');
          })()}
          ${b.note ? `<div style="padding:10px 20px;font-size:12px;color:#9CA3AF;font-style:italic;border-top:1px solid #F3F4F6;">📝 ${b.note}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  document.body.innerHTML = `
    <div style="height:100vh;display:flex;flex-direction:column;background:#F3F4F6;">
      <!-- Header -->
      <header style="background:#0052CC;color:white;display:flex;align-items:center;gap:14px;padding:0 20px;height:54px;flex-shrink:0;">
        <button onclick="window.location.href='customer.html'" style="background:rgba(255,255,255,.15);border:none;color:white;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;">← Khách hàng</button>
        <div style="font-size:15px;font-weight:700;">Chi tiết đơn hàng</div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
          <button onclick="window.print()" style="background:rgba(255,255,255,.15);border:none;color:white;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;">🖨 In đơn</button>
          <button onclick="window.location.href='checkout.html'" style="background:white;color:#0052CC;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;">+ Tạo đơn mới</button>
        </div>
      </header>

      <!-- Success banner -->
      <div style="background:#D1FAE5;border-bottom:1px solid #A7F3D0;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <span style="font-size:20px;">✅</span>
        <div>
          <div style="font-size:14px;font-weight:700;color:#065F46;">Đơn hàng đã tạo thành công!</div>
          <div style="font-size:12px;color:#047857;">Mã đơn ${orderNum} · Tạo lúc ${createdAt}</div>
        </div>
      </div>

      <!-- Content -->
      <div style="flex:1;overflow-y:auto;padding:20px;">
        <div style="max-width:900px;margin:0 auto;">

          <!-- Order summary cards -->
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">
            <div style="background:white;border-radius:10px;padding:14px 18px;border:1px solid #E5E7EB;">
              <div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.4px;font-weight:600;">Mã đơn</div>
              <div style="font-size:16px;font-weight:800;color:#0052CC;margin-top:4px;">${orderNum}</div>
            </div>
            <div style="background:white;border-radius:10px;padding:14px 18px;border:1px solid #E5E7EB;">
              <div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.4px;font-weight:600;">Trạng thái</div>
              <div style="margin-top:6px;">${statusBadge}</div>
            </div>
            <div style="background:white;border-radius:10px;padding:14px 18px;border:1px solid #E5E7EB;">
              <div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.4px;font-weight:600;">Nguyên liệu · Tuổi</div>
              <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;">
                ${(() => {
                  const mg = groupItemsByMaterial(cartItems);
                  return mg.map(g => {
                    const gc = GROUP_COLORS[g.materialId] || GROUP_COLORS['bac'];
                    return `<span style="display:inline-flex;align-items:center;gap:3px;background:${gc.bg};border:1px solid ${gc.border};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;color:${gc.text};">${g.icon} ${g.material}${g.purity ? ' · '+g.purity : ''}</span>`;
                  }).join('');
                })()}
              </div>
            </div>
            <div style="background:white;border-radius:10px;padding:14px 18px;border:1px solid #E5E7EB;">
              <div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.4px;font-weight:600;">Sản phẩm</div>
              <div style="font-size:16px;font-weight:800;color:#111827;margin-top:4px;">${totalMau} mẫu · ${totalQty} sp</div>
            </div>
            <div style="background:white;border-radius:10px;padding:14px 18px;border:1px solid #E5E7EB;">
              <div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.4px;font-weight:600;">Tổng giá trị</div>
              <div style="font-size:16px;font-weight:800;color:#0052CC;margin-top:4px;">${fmt(totalValue)}</div>
            </div>
          </div>

          <!-- Customer card -->
          <div style="background:white;border-radius:10px;padding:16px 20px;border:1px solid #E5E7EB;margin-bottom:20px;display:flex;align-items:center;gap:16px;">
            <div style="width:44px;height:44px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:20px;">👤</div>
            <div style="flex:1;">
              <div style="font-size:15px;font-weight:700;color:#111827;">${customer.name}</div>
              <div style="font-size:12px;color:#6B7280;margin-top:2px;">${customer.code || ''} ${customer.phone ? '· 📞 '+customer.phone : ''}</div>
            </div>
          </div>

          <!-- Batches timeline -->
          <div style="margin-bottom:20px;">
            <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:12px;">📦 Chi tiết ${batches.length} đợt giao</div>
            ${timelineHtml}
          </div>

        </div>
      </div>
    </div>
  `;
}

// ── CUSTOMER DROPDOWN ─────────────────────────────────
function toggleCustomerDD(e) {
  e.stopPropagation();
  const dd = document.getElementById('customerDD');
  const visible = dd.style.display !== 'none';
  dd.style.display = visible ? 'none' : 'block';
  if (!visible) {
    document.getElementById('ddName').textContent = customer.name;
    document.getElementById('ddDetail').innerHTML =
      (customer.code ? `Mã KH: ${customer.code}<br>` : '') +
      (customer.phone ? `📞 ${customer.phone}<br>` : '') +
      (customer.address || '');
  }
}

function changeCustomer() {
  document.getElementById('customerDD').style.display = 'none';
  window.location.href = 'start.html';
}

document.addEventListener('click', () => {
  const dd = document.getElementById('customerDD');
  if (dd) dd.style.display = 'none';
});

// ── START ─────────────────────────────────────────────
init();
</script>
</body>
</html>
