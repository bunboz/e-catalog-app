<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng - E-Catalog</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .cart-container {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      padding: 24px;
      background-color: white;
    }

    .cart-items {
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      overflow: hidden;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--border-gray);
      align-items: center;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-image {
      width: 120px;
      height: 120px;
      background-color: var(--bg-light);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cart-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .cart-item-meta {
      font-size: 12px;
      color: var(--text-gray);
      margin-bottom: 8px;
    }

    .cart-item-price {
      font-weight: 600;
      color: var(--primary-blue);
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cart-item-quantity {
      display: flex;
      align-items: center;
      border: 1px solid var(--border-gray);
      border-radius: 4px;
    }

    .cart-item-quantity button {
      background: none;
      border: none;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-gray);
      transition: color 0.2s;
    }

    .cart-item-quantity button:hover {
      color: var(--primary-blue);
    }

    .cart-item-quantity input {
      width: 40px;
      border: none;
      text-align: center;
      font-weight: 500;
      font-size: 13px;
    }

    .btn-remove-item {
      background: none;
      border: none;
      color: #EF4444;
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
    }

    .btn-remove-item:hover {
      color: #DC2626;
    }

    .cart-summary {
      position: sticky;
      top: 24px;
      background-color: var(--bg-light);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 20px;
      height: fit-content;
    }

    .summary-title {
      font-weight: 600;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-gray);
    }

    .summary-row:last-child {
      border-bottom: none;
      margin-bottom: 16px;
      padding-bottom: 0;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 16px;
      color: var(--primary-blue);
    }

    .btn-checkout {
      width: 100%;
      background-color: var(--primary-blue);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
      margin-bottom: 8px;
    }

    .btn-checkout:hover {
      background-color: var(--dark-blue);
    }

    .btn-continue-shopping {
      width: 100%;
      background-color: white;
      color: var(--text-dark);
      border: 1px solid var(--border-gray);
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-continue-shopping:hover {
      border-color: var(--primary-blue);
      background-color: var(--light-blue);
    }

    .empty-cart {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      color: var(--text-gray);
    }

    .empty-cart-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-cart h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text-dark);
    }

    @media (max-width: 768px) {
      .cart-container {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }

      .cart-item {
        grid-template-columns: 80px 1fr;
      }

      .cart-item-actions {
        grid-column: 1 / -1;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">E-Catalog</div>
    <div class="header-search">
      <input type="text" placeholder="Tìm mã màu, tên sản phẩm">
    </div>
    <div class="header-divider"></div>
    <div class="header-actions">
      <button class="btn-select-customer">
        <span>👤</span>
        <span>Chọn khách hàng</span>
      </button>
      <button class="header-icon-btn">🛒</button>
      <button class="header-icon-btn">🔔</button>
      <div class="header-profile">
        <div class="profile-avatar">N</div>
        <span>Nguyễn Văn B</span>
      </div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div style="padding: 24px; background-color: #f5f5f5; min-height: calc(100vh - 64px);">
    <div style="max-width: 1200px; margin: 0 auto;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
        <div>
          <h1 style="font-size: 24px; font-weight: 600; margin-bottom: 4px;">Giỏ hàng</h1>
          <p style="color: #6B7280; font-size: 14px;" id="cartInfo">Đang tải...</p>
        </div>
        <a href="index.html" style="padding: 10px 16px; background-color: white; border: 1px solid #E5E7EB; border-radius: 6px; cursor: pointer; text-decoration: none; font-weight: 500; color: #0052CC;">← Quay lại mua hàng</a>
      </div>

      <div class="cart-container" id="cartContainer">
        <!-- CART ITEMS -->
        <div class="cart-items" id="cartItems">
          <!-- Items will be loaded dynamically -->
        </div>

        <!-- CART SUMMARY -->
        <div class="cart-summary" id="cartSummary">
          <div class="summary-title">Tóm tắt đơn hàng</div>

          <div class="summary-row">
            <span>Tổng sản phẩm:</span>
            <strong id="totalItems">0</strong>
          </div>

          <div class="summary-row">
            <span>Tiền hàng:</span>
            <strong id="totalPrice">0đ</strong>
          </div>

          <div class="summary-row">
            <span>Phí vận chuyển:</span>
            <strong>0đ</strong>
          </div>

          <div class="summary-row">
            <span>Giảm giá:</span>
            <strong style="color: #10B981;">-0đ</strong>
          </div>

          <div class="summary-total">
            <span>Tổng cộng:</span>
            <span id="grandTotal">0đ</span>
          </div>

          <button class="btn-checkout" onclick="goToCheckout()">Tạo đơn hàng</button>
          <button class="btn-continue-shopping" onclick="window.location.href='index.html'">Tiếp tục mua sắm</button>

          <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-gray); font-size: 12px; color: var(--text-gray);">
            <p style="margin-bottom: 8px;">📞 Hỗ trợ khách hàng 24/7</p>
            <p>Liên hệ: support@ecatalog.vn</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load cart data
    let cartData = {
      customer: null,
      orderId: null,
      cart: []
    };

    let cartItems = [];

    function loadCartData() {
      const data = sessionStorage.getItem('cartData');
      if (data) {
        cartData = JSON.parse(data);
        cartItems = cartData.cart || [];

        if (!cartData.customer) {
          document.getElementById('cartContainer').innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 60px 24px; color: #6B7280;">
              <div style="font-size: 64px; margin-bottom: 16px; opacity: 0.5;">📦</div>
              <h3 style="font-size: 18px; margin-bottom: 8px; color: #1F2937;">Chưa chọn khách hàng</h3>
              <p>Vui lòng quay lại trang danh sách sản phẩm để chọn khách hàng</p>
              <a href="index.html" style="display: inline-block; margin-top: 16px; padding: 12px 24px; background-color: #0052CC; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">← Quay lại</a>
            </div>
          `;
          return;
        }

        document.getElementById('cartInfo').textContent = `Khách hàng: ${cartData.customer.name} • Đơn hàng: ${cartData.orderId}`;
        renderCart();
      } else {
        document.getElementById('cartContainer').innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 60px 24px; color: #6B7280;">
            <div style="font-size: 64px; margin-bottom: 16px; opacity: 0.5;">🛒</div>
            <h3 style="font-size: 18px; margin-bottom: 8px; color: #1F2937;">Giỏ hàng trống</h3>
            <p>Không có sản phẩm nào trong giỏ hàng</p>
            <a href="index.html" style="display: inline-block; margin-top: 16px; padding: 12px 24px; background-color: #0052CC; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">← Quay lại mua hàng</a>
          </div>
        `;
      }
    }

    function renderCart() {
      if (cartItems.length === 0) {
        document.getElementById('cartItems').innerHTML = '<p style="padding: 40px; text-align: center; color: #6B7280;">Giỏ hàng trống</p>';
        updateSummary();
        return;
      }

      document.getElementById('cartItems').innerHTML = cartItems.map((item, index) => `
        <div class="cart-item" data-index="${index}">
          <div class="cart-item-image">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect fill='%23f5f5f5' width='120' height='120'/%3E%3C/svg%3E" alt="Product">
          </div>
          <div class="cart-item-details">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-meta">Màu: ${item.color} • Đá: ${item.stone}</div>
            <div class="cart-item-price">${formatPrice(item.price)}đ</div>
          </div>
          <div class="cart-item-actions">
            <div class="cart-item-quantity">
              <button onclick="decreaseQuantity(${index})">−</button>
              <input type="number" value="${item.quantity}" readonly>
              <button onclick="increaseQuantity(${index})">+</button>
            </div>
            <button class="btn-remove-item" onclick="removeItem(${index})">🗑</button>
          </div>
        </div>
      `).join('');

      updateSummary();
    }

    function formatPrice(price) {
      return new Intl.NumberFormat('vi-VN').format(price);
    }

    function increaseQuantity(index) {
      cartItems[index].quantity++;
      saveCartData();
      renderCart();
    }

    function decreaseQuantity(index) {
      if (cartItems[index].quantity > 1) {
        cartItems[index].quantity--;
        saveCartData();
        renderCart();
      }
    }

    function removeItem(index) {
      const item = document.querySelector(`[data-index="${index}"]`);
      item.style.opacity = '0.5';
      setTimeout(() => {
        cartItems.splice(index, 1);
        saveCartData();
        renderCart();
      }, 200);
    }

    function updateSummary() {
      const totalItems = cartItems.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      document.getElementById('totalItems').textContent = totalItems;
      document.getElementById('totalPrice').textContent = formatPrice(totalPrice) + 'đ';
      document.getElementById('grandTotal').textContent = formatPrice(totalPrice) + 'đ';
    }

    function saveCartData() {
      cartData.cart = cartItems;
      sessionStorage.setItem('cartData', JSON.stringify(cartData));
    }

    function goToCheckout() {
      if (cartItems.length === 0) {
        alert('Giỏ hàng trống');
        return;
      }
      sessionStorage.setItem('cartData', JSON.stringify(cartData));
      window.location.href = 'checkout.html';
    }

    // Initialize
    loadCartData();
  </script>
</body>
</html>
